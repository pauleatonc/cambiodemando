# Producción: levanta con cambiodemando.settings.prod
# Uso: docker compose -f docker-compose-prod.yml up --build
# Definir en .env o en el host: SECRET_KEY, ALLOWED_HOSTS, POSTGRES_*

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: cambiodemando_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn cambiodemando.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120 --access-logfile - --error-logfile - --log-level info"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: cambiodemando.settings.prod
      DB_HOST: db
    ports:
      - "8001:8000"
    volumes:
      - daily_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - mda_network_prod

  scheduler:
    build: .
    container_name: cambiodemando_scheduler
    command: >
      sh -c "until python manage.py migrate --check >/dev/null 2>&1; do
               echo 'Waiting for migrations to be applied by web...';
               sleep 2;
             done;
             python manage.py run_daily_scheduler"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: cambiodemando.settings.prod
      DB_HOST: db
      TZ: America/Santiago
    volumes:
      - daily_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - mda_network_prod

volumes:
  pgdata_prod:
  daily_media:

networks:
  mda_network_prod:
    external: true
