# Producción: levanta con cambiodemando.settings.prod
# Uso: docker compose -f docker-compose-prod.yml up --build
# Definir en .env o en el host: SECRET_KEY, ALLOWED_HOSTS, POSTGRES_*

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: cambiodemando_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn cambiodemando.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: cambiodemando.settings.prod
      DB_HOST: db
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - mda_network_prod

volumes:
  pgdata_prod:

networks:
  mda_network_prod:
    external: true
