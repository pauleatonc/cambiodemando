# Desarrollo: levanta con cambiodemando.settings.dev
# Uso: docker compose up --build
# La app estará en http://localhost:8000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cambiodemando}
      POSTGRES_USER: ${POSTGRES_USER:-cambiodemando}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiodemando}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cambiodemando} -d ${POSTGRES_DB:-cambiodemando}"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: cambiodemando.settings.dev
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
